<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <!--fontawesome-->
        <script src="https://kit.fontawesome.com/337b79918c.js" crossorigin="anonymous"></script>
    <!--googlefonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">
    <!--stylesheet-->
        <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="container">
        <div class="gridOne">
            <p>
                Hello World
            </p>
            <p style="color: blue;">
                My Fantastic Content
            </p>
        </div>

        <div class="gridTwo">
            <div class="red">
                Text1
            </div>

            <div class="blue">
                Text2
            </div>

            <div class="yellow">
                Text3
            </div>
        </div>

        <div class="gridThree">
            <div class="text1">
                This is a sentence.
            </div>

            <div class="image1">
                <img src="../img/osman-rana-LSUuu25azuM-unsplash.jpg" alt="img1">
            </div>
        </div>

        <div class="gridFour">
            <div class="div">
                <p>
                    This is a paragraph
                </p>
            </div>

            <div id="id">
                <p>
                    This is paragraph 1
                </p>

                <p>
                    This is paragraph 2
                </p>
            </div>
        </div>

        <div class="gridFive">
            <div class="text2">
                <p>
                    This is a paragraph
                </p>
            </div>

            <div id="id2">
                <img src="../img/mira-kemppainen-qC117ahi-mE-unsplash-lantern.jpg" alt="lantern">

                <img src="../img/josh-hild-_TuI8tZHlk4-unsplash.jpg" alt="house">
            </div>
        </div>

        <div class="gridSix">
            <div class="icon">
                <i class="fa-solid fa-spa"></i>
            </div>

            <div class="text3">
                <p>
                    This is a Google Font
                </p>
            </div>
        </div>
    </div>
</body>
</html>
